apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicaset
  labels:
    project: practice
    
spec:
  # modify replicas according to your case
  replicas: 3
  selector:
    matchLabels:
      tier: replicaset-nginx
  template:
    metadata:
      labels:
        tier: replicaset-nginx
    spec:
      containers:
      - name: nginx
        image: nginx
