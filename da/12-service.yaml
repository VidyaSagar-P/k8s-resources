apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    project: practice
    module: test

spec: 
  # if type is not mentioned here then consider it as CLUSTER IP. default one-it is used for internal pod to pod communication
  selector:
    # this service will attaches with pod: labels
    project: practice
    env: dev
    module: k8s-resources
  ports:
  - protocol: TCP
    port: 80 # service port which you want to expose
    targetPort: 80 # container port